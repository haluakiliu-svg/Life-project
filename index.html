<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0f0f0f;color:#e0ddd6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.wrap{max-width:860px;margin:0 auto;padding:28px 20px 80px}

/* top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.page-title{font-size:19px;font-weight:500;color:#e0ddd6;background:transparent;border:none;outline:none;flex:1;caret-color:#4caf7d}
.page-title:focus{border-bottom:1px solid #2a2a2a}
.save-pill{font-size:11px;padding:3px 10px;border-radius:10px;background:#111;border:0.5px solid #222;color:#444;transition:all .3s;white-space:nowrap}
.save-pill.saving{color:#4caf7d;border-color:#1a3a2a}
.save-pill.saved{color:#335533;border-color:#1a2a1a}
.save-pill.error{color:#a03030;border-color:#3a1a1a}

.page-sub{font-size:12px;color:#484848;margin-bottom:1.5rem;background:transparent;border:none;outline:none;width:100%;caret-color:#4caf7d}
.page-sub:focus{border-bottom:1px solid #222}

/* tabs */
.tabs{display:flex;gap:6px;margin-bottom:1.4rem;flex-wrap:wrap}
.tab{padding:5px 15px;border-radius:20px;border:0.5px solid #242424;background:transparent;font-size:12px;cursor:pointer;color:#666;transition:all .15s}
.tab:hover{border-color:#3a3a3a;color:#aaa}
.tab.active{background:#0c1f10;color:#4caf7d;border-color:#1a3a1a;font-weight:500}
.view{display:none}
.view.active{display:block}

/* section label */
.slabel{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#3a3a3a;margin-bottom:.65rem;margin-top:1.2rem;display:flex;align-items:center;gap:8px}
.slabel hr{flex:1;border:none;border-top:0.5px solid #1c1c1c}

/* project cards */
.prow{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px;margin-bottom:.4rem}
.pcard{background:#141414;border:0.5px solid #202020;border-radius:10px;padding:.75rem .9rem;cursor:pointer;transition:border-color .15s}
.pcard:hover{border-color:#333}
.pcard.active{border:1.5px solid #1a3a2a;background:#0f1a12}
.pcard-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pcard-title{font-size:13px;font-weight:500;color:#ccc;background:transparent;border:none;outline:none;width:calc(100% - 18px);caret-color:#4caf7d}
.pcard-sub{font-size:11px;color:#3d3d3d;background:transparent;border:none;outline:none;width:100%;caret-color:#4caf7d}

/* detail panel */
.detail{background:#141414;border:0.5px solid #202020;border-radius:10px;padding:1.1rem 1.2rem;margin-top:.9rem;margin-bottom:.9rem}
.detail-head{display:flex;align-items:center;gap:8px;margin-bottom:.9rem;flex-wrap:wrap}
.detail-title{font-size:15px;font-weight:500;color:#ddd}
.badge{font-size:10px;padding:2px 9px;border-radius:8px;font-weight:500}
.freq-lbl{font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:#3d3d3d;margin:1rem 0 .4rem;display:block}
.task-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:0.5px solid #1c1c1c;position:relative}
.task-row:last-of-type{border-bottom:none}
.task-row:hover .delbtn{opacity:1}
.chk{width:16px;height:16px;border-radius:4px;border:0.5px solid #333;flex-shrink:0;cursor:pointer;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;min-width:16px}
.chk:hover{border-color:#4a4a4a}
.chk.on{background:#0c2018;border-color:#1a4a2a}
.chk.on::after{content:'✓';font-size:9px;color:#4caf7d}
.task-body{flex:1;min-width:0}
.task-name{font-size:12px;color:#bbb;background:transparent;border:none;outline:none;width:100%;line-height:1.5;caret-color:#4caf7d}
.task-name.done{text-decoration:line-through;color:#333}
.task-note{font-size:11px;color:#3d3d3d;background:transparent;border:none;outline:none;width:100%;caret-color:#4caf7d;margin-top:1px}
.delbtn{opacity:0;font-size:13px;color:#2d2d2d;cursor:pointer;padding:0 3px;background:none;border:none;transition:opacity .15s,color .15s;flex-shrink:0;line-height:1}
.delbtn:hover{color:#b03030}
.addbtn{font-size:11px;color:#333;cursor:pointer;padding:5px 0;display:flex;align-items:center;gap:4px;background:none;border:none;transition:color .15s;margin-top:2px}
.addbtn:hover{color:#4caf7d}

/* timeline */
.tl-wrap{margin-top:.2rem}
.month-block{margin-bottom:2rem}
.month-ttl{font-size:14px;font-weight:500;color:#ccc;margin-bottom:.65rem;display:flex;align-items:center;gap:7px}
.mbadge{font-size:10px;padding:2px 8px;border-radius:8px}
.mb1{background:#081a0c;color:#3a8e55}
.mb2{background:#10102a;color:#6a62cc}
.mb3{background:#1a1005;color:#9a7030}
.week-row{display:grid;grid-template-columns:52px 1fr;margin-bottom:4px}
.week-lbl{font-size:11px;color:#3a3a3a;padding:6px 8px 6px 0;background:transparent;border:none;outline:none;caret-color:#4caf7d}
.week-items{border-left:1.5px solid #1c1c1c;padding:4px 0 4px 10px;display:flex;flex-direction:column;gap:3px}
.week-item{display:flex;align-items:flex-start;gap:5px;position:relative;padding:2px 0}
.week-item:hover .delbtn{opacity:1}
.idot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px}
.ibody{flex:1;min-width:0}
.itext{font-size:12px;color:#bbb;background:transparent;border:none;outline:none;width:100%;line-height:1.5;caret-color:#4caf7d}
.itext.done{text-decoration:line-through;color:#333}
.iproj{font-size:10px;color:#3a3a3a;background:transparent;border:none;outline:none;width:100%;caret-color:#4caf7d}
.add-week-btn{font-size:11px;color:#2a2a2a;cursor:pointer;padding:3px 0 3px 10px;background:none;border:none;border-left:1.5px solid #1c1c1c;transition:color .15s;margin-top:1px;display:block}
.add-week-btn:hover{color:#4caf7d}

/* loading overlay */
.loading{position:fixed;inset:0;background:#0f0f0f;display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.loading.hidden{display:none}
.spinner{width:28px;height:28px;border:2px solid #1c1c1c;border-top-color:#4caf7d;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:#444}

input[type=text]::placeholder{color:#2a2a2a}
</style>
</head>

// ── State ──────────────────────────────────────────────────
let pdata = JSON.parse(JSON.stringify(DEF_PDATA));
let tlData = JSON.parse(JSON.stringify(DEF_TL));
let saveTimer = null;
let currentKey = null;

// ── Supabase load / save ───────────────────────────────────
async function loadFromDB() {
  try {
    const { data, error } = await sb.from('projects_data').select('payload').eq('id', ROW_ID).single();
    if (error && error.code !== 'PGRST116') throw error;
    if (data?.payload) {
      const d = data.payload;
      if (d.title) document.getElementById('ptitle').value = d.title;
      if (d.sub)   document.getElementById('psub').value   = d.sub;
      if (d.pdata) pdata  = d.pdata;
      if (d.tlData) tlData = d.tlData;
    }
  } catch(e) {
    console.warn('load error', e);
  }
  renderTimeline();
  document.getElementById('loading').classList.add('hidden');
  setPill('就緒', '');
}

async function saveToDB() {
  setPill('儲存中…', 'saving');
  try {
    const payload = {
      title:  document.getElementById('ptitle').value,
      sub:    document.getElementById('psub').value,
      pdata, tlData
    };
    const { error } = await sb.from('projects_data')
      .upsert({ id: ROW_ID, payload, updated_at: new Date().toISOString() });
    if (error) throw error;
    setPill('已儲存 ✓', 'saved');
    setTimeout(() => setPill('就緒', ''), 3000);
  } catch(e) {
    setPill('儲存失敗', 'error');
    console.error(e);
  }
}

function schedule() {
  setPill('未儲存…', '');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToDB, 900);
}

function setPill(txt, cls) {
  const p = document.getElementById('spill');
  p.textContent = txt;
  p.className = 'save-pill' + (cls ? ' ' + cls : '');
}

// ── UI helpers ─────────────────────────────────────────────
function sw(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-' + tab).classList.add('active');
}

function sel(el, key) {
  document.querySelectorAll('.pcard').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentKey = key;
  renderDetail(key);
}

function renderDetail(key) {
  const d = pdata[key];
  document.getElementById('detail-area').innerHTML = `<div class="detail">
    <div class="detail-head">
      <span class="detail-title">${d.title}</span>
      <span class="badge" style="background:${d.bg};color:${d.fc}">${d.badge}</span>
    </div>
    ${d.groups.map((g, gi) => `
      <span class="freq-lbl">${g.label}</span>
      ${g.tasks.map((t, ti) => `
        <div class="task-row">
          <div class="chk${t.done ? ' on' : ''}" onclick="toggleTask('${key}',${gi},${ti},this)"></div>
          <div class="task-body">
            <input class="task-name${t.done ? ' done' : ''}" type="text" value="${esc(t.n)}"
              oninput="pdata['${key}'].groups[${gi}].tasks[${ti}].n=this.value;schedule()">
            <input class="task-note" type="text" value="${esc(t.note)}" placeholder="備註"
              oninput="pdata['${key}'].groups[${gi}].tasks[${ti}].note=this.value;schedule()">
          </div>
          <button class="delbtn" onclick="delTask('${key}',${gi},${ti})">×</button>
        </div>`).join('')}
      <button class="addbtn" onclick="addTask('${key}',${gi})">＋ 新增任務</button>
    `).join('')}
  </div>`;
}

function toggleTask(key, gi, ti, el) {
  pdata[key].groups[gi].tasks[ti].done ^= true;
  el.classList.toggle('on');
  el.nextElementSibling.querySelector('.task-name').classList.toggle('done');
  schedule();
}
function delTask(key, gi, ti) {
  pdata[key].groups[gi].tasks.splice(ti, 1);
  renderDetail(key); schedule();
}
function addTask(key, gi) {
  pdata[key].groups[gi].tasks.push({ n: '新任務', note: '', done: false });
  renderDetail(key); schedule();
}

function renderTimeline() {
  document.getElementById('tl').innerHTML = tlData.map((m, mi) => `
    <div class="month-block">
      <div class="month-ttl">${m.month} <span class="mbadge ${m.mb}">${m.mt}</span></div>
      ${m.weeks.map((w, wi) => `
        <div class="week-row">
          <input class="week-lbl" type="text" value="${esc(w.lbl)}"
            oninput="tlData[${mi}].weeks[${wi}].lbl=this.value;schedule()">
          <div class="week-items">
            ${w.items.map((it, ii) => `
              <div class="week-item">
                <span class="idot" style="background:${it.c}"></span>
                <div class="ibody">
                  <input class="itext${it.done?' done':''}" type="text" value="${esc(it.t)}"
                    oninput="tlData[${mi}].weeks[${wi}].items[${ii}].t=this.value;schedule()">
                  <input class="iproj" type="text" value="${esc(it.p)}"
                    oninput="tlData[${mi}].weeks[${wi}].items[${ii}].p=this.value;schedule()">
                </div>
                <button class="delbtn"
                  onclick="tlData[${mi}].weeks[${wi}].items.splice(${ii},1);renderTimeline();schedule()">×</button>
              </div>`).join('')}
            <button class="add-week-btn"
              onclick="tlData[${mi}].weeks[${wi}].items.push({c:'#7F77DD',t:'新任務',p:'Project',done:false});renderTimeline();schedule()">
              ＋ 新增
            </button>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

function esc(s) { return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ── Boot ───────────────────────────────────────────────────
loadFromDB();
</script>
