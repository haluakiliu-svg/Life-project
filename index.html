<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Projects Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0f0f0f;color:#e0ddd6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.wrap{max-width:860px;margin:0 auto;padding:28px 20px 80px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:12px}
.page-title{font-size:23px;font-weight:500;color:#e0ddd6;background:transparent;border:none;outline:none;flex:1;caret-color:#4caf7d;min-width:0}
.page-title:focus{border-bottom:1px solid #888}
.save-pill{font-size:15px;padding:3px 10px;border-radius:10px;background:#111;border:0.5px solid #222;color:#e8e5de;transition:all .3s;white-space:nowrap;flex-shrink:0}
.save-pill.saving{color:#4caf7d;border-color:#1a3a2a}
.save-pill.saved{color:#335533;border-color:#1a2a1a}
.page-sub{font-size:17px;color:#edeae3;margin-bottom:1.5rem;background:transparent;border:none;outline:none;width:100%;caret-color:#4caf7d}
.tabs{display:flex;gap:6px;margin-bottom:1.4rem;flex-wrap:wrap}
.tab{padding:5px 15px;border-radius:20px;border:0.5px solid #555;background:transparent;font-size:16px;cursor:pointer;color:#edeae3;transition:all .15s}
.tab:hover{border-color:#e8e5de;color:#e8e5de}
.tab.active{background:#0c1f10;color:#4caf7d;border-color:#1a3a1a;font-weight:500}
.view{display:none}.view.active{display:block}
.slabel{font-size:15px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#edeae3;margin-bottom:.65rem;margin-top:1.2rem;display:flex;align-items:center;gap:8px}
.slabel hr{flex:1;border:none;border-top:0.5px solid #2a2a2a}
.prow{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px;margin-bottom:.4rem}
.pcard{background:#141414;border:0.5px solid #333;border-radius:10px;padding:.75rem .9rem;cursor:pointer;transition:border-color .15s}
.pcard:hover{border-color:#e8e5de}
.pcard.active{border:1.5px solid #1a3a2a;background:#0f1a12}
.pcard-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pcard-title{font-size:17px;font-weight:500;color:#e8e5de;background:transparent;border:none;outline:none;width:calc(100% - 18px);caret-color:#4caf7d}
.pcard-sub{font-size:16px;color:#edeae3;background:transparent;border:none;outline:none;width:100%;caret-color:#4caf7d}
.detail{background:#141414;border:0.5px solid #333;border-radius:10px;padding:1.1rem 1.2rem;margin-top:.9rem;margin-bottom:.9rem}
.detail-head{display:flex;align-items:center;gap:8px;margin-bottom:.9rem;flex-wrap:wrap}
.detail-title{font-size:19px;font-weight:500;color:#edeae3}
.badge{font-size:14px;padding:2px 9px;border-radius:8px;font-weight:500}
.freq-lbl{font-size:15px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:#edeae3;margin:1rem 0 .4rem;display:block}
.task-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:0.5px solid #2a2a2a;position:relative}
.task-row:last-of-type{border-bottom:none}
.task-row:hover .delbtn{opacity:1}
.chk{width:16px;height:16px;border-radius:4px;border:0.5px solid #888;flex-shrink:0;cursor:pointer;margin-top:3px;display:flex;align-items:center;justify-content:center;transition:all .15s;min-width:16px}
.chk:hover{border-color:#4a4a4a}
.chk.on{background:#0c2018;border-color:#1a4a2a}
.chk.on::after{content:'✓';font-size:13px;color:#4caf7d}
.task-body{flex:1;min-width:0}
.task-name{font-size:18px;color:#edeae3;background:transparent;border:none;outline:none;width:100%;line-height:1.6;caret-color:#4caf7d;resize:none;overflow:hidden;font-family:inherit;display:block;padding:0}
.task-name.done{text-decoration:line-through;color:#e8e5de}
.task-note{font-size:16px;color:#edeae3;background:transparent;border:none;outline:none;width:100%;caret-color:#4caf7d;margin-top:2px;resize:none;overflow:hidden;font-family:inherit;display:block;padding:0}
.task-note:focus{color:#edeae3}
.delbtn{opacity:0;font-size:17px;color:#e8e5de;cursor:pointer;padding:0 3px;background:none;border:none;transition:opacity .15s,color .15s;flex-shrink:0;line-height:1;margin-top:3px}
.delbtn:hover{color:#b03030}
.addbtn{font-size:15px;color:#e8e5de;cursor:pointer;padding:5px 0;display:flex;align-items:center;gap:4px;background:none;border:none;transition:color .15s;margin-top:2px}
.addbtn:hover{color:#4caf7d}
.tl-wrap{margin-top:.2rem}
.month-block{margin-bottom:2rem}
.month-ttl{font-size:20px;font-weight:500;color:#e0ddd6;margin-bottom:.65rem;display:flex;align-items:center;gap:7px}
.mbadge{font-size:14px;padding:2px 8px;border-radius:8px}
.mb1{background:#081a0c;color:#4caf7d}
.mb2{background:#10102a;color:#9f99ee}
.mb3{background:#1a1005;color:#c4943a}
.week-row{display:grid;grid-template-columns:52px 1fr;margin-bottom:4px}
.week-lbl{font-size:17px;color:#e8e5de;padding:6px 8px 6px 0;background:transparent;border:none;outline:none;caret-color:#4caf7d}
.week-items{border-left:1.5px solid #2a2a2a;padding:4px 0 4px 10px;display:flex;flex-direction:column;gap:3px}
.week-item{display:flex;align-items:flex-start;gap:5px;position:relative;padding:2px 0}
.week-item:hover .delbtn{opacity:1}
.idot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:6px}
.ibody{flex:1;min-width:0}
.itext{font-size:18px;color:#edeae3;background:transparent;border:none;outline:none;width:100%;line-height:1.6;caret-color:#4caf7d;resize:none;overflow:hidden;font-family:inherit;display:block;padding:0}
.itext.done{text-decoration:line-through;color:#e8e5de}
.iproj{font-size:16px;color:#edeae3;background:transparent;border:none;outline:none;width:100%;caret-color:#4caf7d}
.add-week-btn{font-size:15px;color:#e8e5de;cursor:pointer;padding:3px 0 3px 10px;background:none;border:none;border-left:1.5px solid #2a2a2a;transition:color .15s;margin-top:1px;display:block}
.add-week-btn:hover{color:#4caf7d}
.loading{position:fixed;inset:0;background:#0f0f0f;display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.loading.hidden{display:none}
.spinner{width:28px;height:28px;border:2px solid #2a2a2a;border-top-color:#4caf7d;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:17px;color:#e8e5de}
</style>
</head>

function ar(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}

async function loadFromDB(){
  try{
    const {data,error}=await sb.from('projects_data').select('payload').eq('id',ROW_ID).single();
    if(error&&error.code!=='PGRST116') throw error;
    if(data?.payload) apply(data.payload);
    else{ const ls=localStorage.getItem(LS_KEY); if(ls) apply(JSON.parse(ls)); }
  }catch(e){ const ls=localStorage.getItem(LS_KEY); if(ls) apply(JSON.parse(ls)); }
  renderCards();
  renderTimeline();
  document.getElementById('loading').classList.add('hidden');
  setPill('就緒','');
}

function apply(d){
  if(d.title) document.getElementById('ptitle').value=d.title;
  if(d.sub) document.getElementById('psub').value=d.sub;
  if(d.pdata) pdata=d.pdata;
  if(d.tlData) tlData=d.tlData;
}

async function saveToDB(){
  setPill('儲存中…','saving');
  const payload={title:document.getElementById('ptitle').value,sub:document.getElementById('psub').value,pdata,tlData};
  localStorage.setItem(LS_KEY,JSON.stringify(payload));
  try{
    const {error}=await sb.from('projects_data').upsert({id:ROW_ID,payload,updated_at:new Date().toISOString()});
    if(error) throw error;
    setPill('已儲存 ✓','saved');
  }catch(e){ setPill('已儲存（本機）','saved'); }
  setTimeout(()=>setPill('就緒',''),3000);
}

function schedule(){ setPill('未儲存…',''); clearTimeout(saveTimer); saveTimer=setTimeout(saveToDB,900); }
function setPill(txt,cls){ const p=document.getElementById('spill'); p.textContent=txt; p.className='save-pill'+(cls?' '+cls:''); }

function sw(tab,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-'+tab).classList.add('active');
}

const CARD_META = {
  biz1:{dot:'#EF9F27',sub:'官網 · 案例 · FB 分享'},
  biz2:{dot:'#EF9F27',sub:'腳本 · 拍攝 · 剪輯發布'},
  inv: {dot:'#1D9E75',sub:'規則 · 操作紀律 · 知識'},
  travel:{dot:'#7F77DD',sub:'選地點 · 歷史研究 · 內容'},
  jp:  {dot:'#7F77DD',sub:'每日複習 · 聽力 · 輸出'},
  guitar:{dot:'#7F77DD',sub:'指法 · 曲目 · 錄音'},
  edit:{dot:'#7F77DD',sub:'學習 · 實作 · 積累'}
};

function renderCards(){
  const rows={
    'prow-biz':['biz1','biz2'],
    'prow-inv':['inv'],
    'prow-cur':['travel','jp','guitar','edit']
  };
  Object.entries(rows).forEach(([rowId,keys])=>{
    const row=document.getElementById(rowId);
    row.innerHTML=keys.map(key=>{
      const d=pdata[key]; const m=CARD_META[key];
      return `<div class="pcard" id="card-${key}" onclick="sel(this,'${key}')">
        <div class="pcard-top"><span class="dot" style="background:${m.dot}"></span>
          <input class="pcard-title" type="text" value="${esc(d.title)}"
            oninput="pdata['${key}'].title=this.value;schedule()" onclick="event.stopPropagation()">
        </div>
        <input class="pcard-sub" type="text" value="${esc(d.badge)}"
          oninput="pdata['${key}'].badge=this.value;schedule()" onclick="event.stopPropagation()">
      </div>`;
    }).join('');
  });
}

function sel(el,key){
  document.querySelectorAll('.pcard').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderDetail(key);
}

function renderDetail(key){
  const d=pdata[key];
  document.getElementById('detail-area').innerHTML=`<div class="detail">
    <div class="detail-head">
      <span class="detail-title">${d.title}</span>
      <span class="badge" style="background:${d.bg};color:${d.fc}">${d.badge}</span>
    </div>
    ${d.groups.map((g,gi)=>`
      <span class="freq-lbl">${g.label}</span>
      ${g.tasks.map((t,ti)=>`
        <div class="task-row">
          <div class="chk${t.done?' on':''}" onclick="tog('${key}',${gi},${ti},this)"></div>
          <div class="task-body">
            <textarea class="task-name${t.done?' done':''}" rows="1"
              oninput="pdata['${key}'].groups[${gi}].tasks[${ti}].n=this.value;ar(this);schedule()"
            >${esc(t.n)}</textarea>
            <textarea class="task-note" rows="1" placeholder="備註"
              oninput="pdata['${key}'].groups[${gi}].tasks[${ti}].note=this.value;ar(this);schedule()"
            >${esc(t.note)}</textarea>
          </div>
          <button class="delbtn" onclick="delT('${key}',${gi},${ti})">×</button>
        </div>`).join('')}
      <button class="addbtn" onclick="addT('${key}',${gi})">＋ 新增任務</button>
    `).join('')}
  </div>`;
  document.querySelectorAll('#detail-area textarea').forEach(ar);
}

function tog(key,gi,ti,el){
  pdata[key].groups[gi].tasks[ti].done^=true;
  el.classList.toggle('on');
  el.nextElementSibling.querySelector('.task-name').classList.toggle('done');
  schedule();
}
function delT(key,gi,ti){pdata[key].groups[gi].tasks.splice(ti,1);renderDetail(key);schedule();}
function addT(key,gi){pdata[key].groups[gi].tasks.push({n:'新任務',note:'',done:false});renderDetail(key);schedule();}

function renderTimeline(){
  document.getElementById('tl').innerHTML=tlData.map((m,mi)=>`
    <div class="month-block">
      <div class="month-ttl">${m.month} <span class="mbadge ${m.mb}">${m.mt}</span></div>
      ${m.weeks.map((w,wi)=>`
        <div class="week-row">
          <input class="week-lbl" type="text" value="${esc(w.lbl)}"
            oninput="tlData[${mi}].weeks[${wi}].lbl=this.value;schedule()">
          <div class="week-items">
            ${w.items.map((it,ii)=>`
              <div class="week-item">
                <span class="idot" style="background:${it.c}"></span>
                <div class="ibody">
                  <textarea class="itext${it.done?' done':''}" rows="1"
                    oninput="tlData[${mi}].weeks[${wi}].items[${ii}].t=this.value;ar(this);schedule()"
                  >${esc(it.t)}</textarea>
                  <input class="iproj" type="text" value="${esc(it.p)}"
                    oninput="tlData[${mi}].weeks[${wi}].items[${ii}].p=this.value;schedule()">
                </div>
                <button class="delbtn"
                  onclick="tlData[${mi}].weeks[${wi}].items.splice(${ii},1);renderTimeline();schedule()">×</button>
              </div>`).join('')}
            <button class="add-week-btn"
              onclick="tlData[${mi}].weeks[${wi}].items.push({c:'#7F77DD',t:'新任務',p:'Project',done:false});renderTimeline();schedule()">＋ 新增</button>
          </div>
        </div>`).join('')}
    </div>`).join('');
  document.querySelectorAll('#tl textarea').forEach(ar);
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

loadFromDB();
</script>
