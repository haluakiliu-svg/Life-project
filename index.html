<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Projects Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0f0f0f;color:#e0ddd6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:28px 20px 100px}

/* top */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:12px}
.page-title{font-size:24px;font-weight:500;color:#e0ddd6;background:transparent;border:none;outline:none;flex:1;caret-color:#4caf7d}
.page-title:focus{border-bottom:1px solid #333}
.save-pill{font-size:13px;padding:4px 12px;border-radius:20px;background:#111;border:0.5px solid #2a2a2a;color:#ccc;transition:all .3s;white-space:nowrap}
.save-pill.saving{color:#4caf7d;border-color:#1a4a2a}
.save-pill.saved{color:#3a7a4a;border-color:#1a3a2a}
.page-sub{font-size:15px;color:#888;margin-bottom:1.75rem;background:transparent;border:none;outline:none;width:100%;caret-color:#4caf7d}

/* tabs */
.tabs{display:flex;gap:6px;margin-bottom:1.5rem}
.tab{padding:6px 18px;border-radius:20px;border:0.5px solid #2a2a2a;background:transparent;font-size:15px;cursor:pointer;color:#888;transition:all .15s}
.tab:hover{border-color:#555;color:#ddd}
.tab.active{background:#0c1f10;color:#4caf7d;border-color:#1a4a2a;font-weight:500}
.view{display:none}.view.active{display:block}

/* priority section */
.priority-section{margin-bottom:2.5rem}
.priority-label{font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:#555;margin-bottom:.75rem;display:flex;align-items:center;gap:10px}
.priority-label hr{flex:1;border:none;border-top:0.5px solid #1e1e1e}

/* project card */
.project-card{background:#141414;border:0.5px solid #252525;border-radius:16px;padding:1.5rem 1.6rem;margin-bottom:14px}
.project-card:hover{border-color:#2e2e2e}

/* 大標題 row */
.proj-title-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.proj-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.proj-title{font-size:22px;font-weight:500;color:#e8e5de;background:transparent;border:none;outline:none;flex:1;caret-color:#4caf7d}
.proj-title:focus{border-bottom:1px solid #333}
.proj-del-btn{opacity:0.2;font-size:14px;color:#c03030;background:none;border:none;cursor:pointer;padding:2px 5px;transition:opacity .15s;flex-shrink:0}
.proj-del-btn:hover{opacity:1}
.collapse-btn{background:none;border:none;cursor:pointer;color:#444;font-size:16px;padding:0 4px;transition:color .15s,transform .2s;flex-shrink:0;line-height:1}
.collapse-btn:hover{color:#aaa}
.collapse-btn.collapsed{transform:rotate(-90deg)}
.card-body{transition:opacity .15s}
.card-body.hidden{display:none}
.color-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;cursor:pointer;position:relative;transition:transform .15s}
.color-dot:hover{transform:scale(1.4)}
.color-picker-popup{position:absolute;top:20px;left:0;background:#1e1e1e;border:0.5px solid #333;border-radius:10px;padding:8px;display:flex;gap:6px;flex-wrap:wrap;width:130px;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.color-picker-popup.hidden{display:none}
.color-option{width:20px;height:20px;border-radius:50%;cursor:pointer;transition:transform .15s;border:2px solid transparent}
.color-option:hover{transform:scale(1.2)}
.color-option.selected{border-color:#fff}

/* 副標（大）*/
.proj-sub{font-size:19px;color:#ccc;background:transparent;border:none;outline:none;width:100%;caret-color:#4caf7d;margin-bottom:10px;line-height:1.4;resize:none;overflow:hidden;font-family:inherit;display:block;padding:0;font-weight:400}
.proj-sub::placeholder{color:#333}
.proj-sub:focus{border-bottom:1px solid #2a2a2a}

/* 說明文字 */
.proj-desc{font-size:15px;color:#777;background:transparent;border:none;outline:none;width:100%;caret-color:#4caf7d;margin-bottom:18px;line-height:1.6;resize:none;overflow:hidden;font-family:inherit;display:block;padding:0}
.proj-desc::placeholder{color:#2a2a2a}
.proj-desc:focus{color:#999}

/* 分隔線 */
.card-divider{border:none;border-top:0.5px solid #1e1e1e;margin-bottom:16px}

/* 中型進度標區塊 */
.stage-block{margin-bottom:18px}
.stage-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.stage-label{font-size:16px;font-weight:500;color:#bbb;background:transparent;border:none;outline:none;flex:1;caret-color:#4caf7d}
.stage-label::placeholder{color:#333}
.stage-label:focus{border-bottom:1px solid #333;color:#ddd}
.stage-del-btn{opacity:0;font-size:13px;color:#444;background:none;border:none;cursor:pointer;padding:1px 4px;transition:opacity .15s,color .15s;flex-shrink:0}
.stage-block:hover .stage-del-btn{opacity:1}
.stage-del-btn:hover{color:#c03030}

/* 項目 */
.items-list{display:flex;flex-direction:column;gap:7px;margin-bottom:8px;padding-left:2px}
.item-row{display:flex;align-items:flex-start;gap:10px}
.item-row:hover .item-del{opacity:1}
.item-chk{width:18px;height:18px;border-radius:5px;border:0.5px solid #3a3a3a;flex-shrink:0;cursor:pointer;margin-top:3px;display:flex;align-items:center;justify-content:center;transition:all .15s;min-width:18px}
.item-chk:hover{border-color:#5a5a5a}
.item-chk.on{background:#0c2018;border-color:#1a5a2a}
.item-chk.on::after{content:'✓';font-size:11px;color:#4caf7d}
.item-text{font-size:17px;color:#ccc;background:transparent;border:none;outline:none;flex:1;caret-color:#4caf7d;line-height:1.5;resize:none;overflow:hidden;font-family:inherit;padding:0}
.item-text:focus{color:#eee}
.item-text.done{text-decoration:line-through;color:#444}
.item-text::placeholder{color:#2a2a2a}
.item-del{opacity:0;font-size:15px;color:#3a3a3a;cursor:pointer;background:none;border:none;padding:0 3px;transition:opacity .15s,color .15s;margin-top:3px;line-height:1;flex-shrink:0}
.item-del:hover{color:#c03030}

/* 新增按鈕 */
.add-item-btn{font-size:14px;color:#3a3a3a;cursor:pointer;background:none;border:none;padding:3px 0;display:flex;align-items:center;gap:5px;transition:color .15s;margin-left:28px}
.add-item-btn:hover{color:#4caf7d}
.add-stage-btn{font-size:14px;color:#3a3a3a;cursor:pointer;background:none;border:none;padding:6px 0;display:flex;align-items:center;gap:5px;transition:color .15s;margin-top:4px}
.add-stage-btn:hover{color:#4caf7d}
.add-proj-btn{width:100%;padding:13px;border:0.5px dashed #222;border-radius:16px;background:transparent;font-size:15px;color:#3a3a3a;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:14px}
.add-proj-btn:hover{border-color:#3a3a3a;color:#4caf7d}

/* timeline */
.month-block{margin-bottom:2.5rem}
.month-ttl{font-size:20px;font-weight:500;color:#e0ddd6;margin-bottom:.75rem;display:flex;align-items:center;gap:8px}
.mbadge{font-size:13px;padding:3px 10px;border-radius:10px}
.mb1{background:#081a0c;color:#4caf7d}
.mb2{background:#10102a;color:#9f99ee}
.mb3{background:#1a1005;color:#c4943a}
.week-row{display:grid;grid-template-columns:60px 1fr;margin-bottom:6px}
.week-lbl{font-size:15px;color:#ccc;padding:7px 10px 7px 0;background:transparent;border:none;outline:none;caret-color:#4caf7d}
.week-items{border-left:1.5px solid #222;padding:4px 0 4px 14px;display:flex;flex-direction:column;gap:5px}
.week-item{display:flex;align-items:flex-start;gap:7px;position:relative}
.week-item:hover .item-del{opacity:1}
.idot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:7px}
.ibody{flex:1;min-width:0}
.itext{font-size:17px;color:#ccc;background:transparent;border:none;outline:none;width:100%;line-height:1.5;caret-color:#4caf7d;resize:none;overflow:hidden;font-family:inherit;display:block;padding:0}
.iproj{font-size:13px;color:#666;background:transparent;border:none;outline:none;width:100%;caret-color:#4caf7d}
.add-week-btn{font-size:14px;color:#3a3a3a;cursor:pointer;padding:3px 0 3px 14px;background:none;border:none;border-left:1.5px solid #222;transition:color .15s;display:block;margin-top:2px}
.add-week-btn:hover{color:#4caf7d}

/* loading */
.loading{position:fixed;inset:0;background:#0f0f0f;display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.loading.hidden{display:none}
.spinner{width:28px;height:28px;border:2px solid #222;border-top-color:#4caf7d;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loading" id="loading"><div class="spinner"></div><div style="font-size:15px;color:#666;margin-top:4px">載入中...</div></div>

</div>

let projects=JSON.parse(JSON.stringify(DEF));
let tlData=JSON.parse(JSON.stringify(DEF_TL));
let saveTimer=null;

function ar(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}

async function loadFromDB(){
  try{
    const {data,error}=await sb.from('projects_data').select('payload').eq('id',ROW_ID).single();
    if(error&&error.code!=='PGRST116') throw error;
    if(data?.payload) apply(data.payload);
    else{const ls=localStorage.getItem(LS_KEY);if(ls) apply(JSON.parse(ls));}
  }catch(e){const ls=localStorage.getItem(LS_KEY);if(ls) apply(JSON.parse(ls));}
  renderProjects();
  renderTimeline();
  document.getElementById('loading').classList.add('hidden');
  setPill('就緒','');
}

function apply(d){
  if(d.title) document.getElementById('ptitle').value=d.title;
  if(d.sub)   document.getElementById('psub').value=d.sub;
  if(d.projects) projects=d.projects;
  if(d.tlData)   tlData=d.tlData;
}

async function saveToDB(){
  setPill('儲存中…','saving');
  const payload={title:document.getElementById('ptitle').value,sub:document.getElementById('psub').value,projects,tlData};
  localStorage.setItem(LS_KEY,JSON.stringify(payload));
  try{
    const {error}=await sb.from('projects_data').upsert({id:ROW_ID,payload,updated_at:new Date().toISOString()});
    if(error) throw error;
    setPill('已儲存 ✓','saved');
  }catch(e){setPill('已儲存（本機）','saved');}
  setTimeout(()=>setPill('就緒',''),3000);
}

function schedule(){setPill('未儲存…','');clearTimeout(saveTimer);saveTimer=setTimeout(saveToDB,900);}
function setPill(t,c){const p=document.getElementById('spill');p.textContent=t;p.className='save-pill'+(c?' '+c:'');}

function sw(tab,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-'+tab).classList.add('active');
}

function renderProjects(){
  document.getElementById('projects-container').innerHTML=projects.map((sec,si)=>`
    <div class="priority-section">
      <div class="priority-label">${sec.priority} <hr></div>
      ${sec.cards.map((card,ci)=>`
        <div class="project-card">
          <div class="proj-title-row">
            <div class="color-dot" style="background:${sec.color}" onclick="toggleColorPicker(event,${si},${ci},'${sec.color}')">
              <div class="color-picker-popup hidden" id="cp-${si}-${ci}">
                ${['#EF9F27','#1D9E75','#7F77DD','#E24B4A','#378ADD','#D4537E','#639922','#888780'].map(col=>`
                  <div class="color-option${sec.color===col?' selected':''}" style="background:${col}"
                    onclick="pickColor(event,${si},${ci},'${col}')"></div>`).join('')}
              </div>
            </div>
            <input class="proj-title" type="text" value="${esc(card.title)}" placeholder="大標題"
              oninput="projects[${si}].cards[${ci}].title=this.value;schedule()">
            <button class="collapse-btn${card.collapsed?' collapsed':''}" onclick="toggleCollapse(${si},${ci})">▼</button>
            <button class="proj-del-btn" onclick="delCard(${si},${ci})">✕</button>
          </div>
          <div class="card-body${card.collapsed?' hidden':''}">
          <textarea class="proj-sub" rows="1" placeholder="副標 — 一句話定位"
            oninput="projects[${si}].cards[${ci}].sub=this.value;ar(this);schedule()"
          >${esc(card.sub)}</textarea>
          <textarea class="proj-desc" rows="1" placeholder="說明文字（可詳細描述這個 Project 的背景、策略、注意事項）"
            oninput="projects[${si}].cards[${ci}].desc=this.value;ar(this);schedule()"
          >${esc(card.desc||'')}</textarea>
          <hr class="card-divider">
          ${card.stages.map((stage,sti)=>`
            <div class="stage-block">
              <div class="stage-header">
                <input class="stage-label" type="text" value="${esc(stage.label)}" placeholder="進度標題"
                  oninput="projects[${si}].cards[${ci}].stages[${sti}].label=this.value;schedule()">
                <button class="stage-del-btn" onclick="delStage(${si},${ci},${sti})">✕</button>
              </div>
              <div class="items-list">
                ${stage.items.map((item,ii)=>`
                  <div class="item-row">
                    <div class="item-chk${item.done?' on':''}" onclick="toggleItem(${si},${ci},${sti},${ii},this)"></div>
                    <textarea class="item-text${item.done?' done':''}" rows="1" placeholder="項目內容"
                      oninput="projects[${si}].cards[${ci}].stages[${sti}].items[${ii}].n=this.value;ar(this);schedule()"
                    >${esc(item.n)}</textarea>
                    <button class="item-del" onclick="delItem(${si},${ci},${sti},${ii})">×</button>
                  </div>`).join('')}
              </div>
              <button class="add-item-btn" onclick="addItem(${si},${ci},${sti})">＋ 新增項目</button>
            </div>`).join('')}
          <button class="add-stage-btn" onclick="addStage(${si},${ci})">＋ 新增進度標</button>
          </div>
        </div>`).join('')}
      <button class="add-proj-btn" onclick="addCard(${si})">＋ 新增 Project</button>
    </div>`).join('');
  document.querySelectorAll('#projects-container textarea').forEach(ar);
}

function toggleItem(si,ci,sti,ii,el){
  projects[si].cards[ci].stages[sti].items[ii].done^=true;
  el.classList.toggle('on');
  el.nextElementSibling.classList.toggle('done');
  schedule();
}
function addItem(si,ci,sti){
  projects[si].cards[ci].stages[sti].items.push({n:'',done:false});
  renderProjects(); schedule();
}
function delItem(si,ci,sti,ii){
  projects[si].cards[ci].stages[sti].items.splice(ii,1);
  renderProjects(); schedule();
}
function addStage(si,ci){
  projects[si].cards[ci].stages.push({label:'',items:[]});
  renderProjects(); schedule();
}
function delStage(si,ci,sti){
  projects[si].cards[ci].stages.splice(sti,1);
  renderProjects(); schedule();
}
function addCard(si){
  projects[si].cards.push({title:'新 Project',sub:'',desc:'',stages:[{label:'',items:[]}]});
  renderProjects(); schedule();
}
function delCard(si,ci){
  projects[si].cards.splice(ci,1);
  renderProjects(); schedule();
}

function renderTimeline(){
  document.getElementById('tl').innerHTML=tlData.map((m,mi)=>`
    <div class="month-block">
      <div class="month-ttl">${m.month} <span class="mbadge ${m.mb}">${m.mt}</span></div>
      ${m.weeks.map((w,wi)=>`
        <div class="week-row">
          <input class="week-lbl" type="text" value="${esc(w.lbl)}"
            oninput="tlData[${mi}].weeks[${wi}].lbl=this.value;schedule()">
          <div class="week-items">
            ${w.items.map((it,ii)=>`
              <div class="week-item">
                <span class="idot" style="background:${it.c}"></span>
                <div class="ibody">
                  <textarea class="itext" rows="1"
                    oninput="tlData[${mi}].weeks[${wi}].items[${ii}].t=this.value;ar(this);schedule()"
                  >${esc(it.t)}</textarea>
                  <input class="iproj" type="text" value="${esc(it.p)}"
                    oninput="tlData[${mi}].weeks[${wi}].items[${ii}].p=this.value;schedule()">
                </div>
                <button class="item-del"
                  onclick="tlData[${mi}].weeks[${wi}].items.splice(${ii},1);renderTimeline();schedule()">×</button>
              </div>`).join('')}
            <button class="add-week-btn"
              onclick="tlData[${mi}].weeks[${wi}].items.push({c:'#7F77DD',t:'',p:'',done:false});renderTimeline();schedule()">＋ 新增</button>
          </div>
        </div>`).join('')}
    </div>`).join('');
  document.querySelectorAll('#tl textarea').forEach(ar);
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function toggleCollapse(si,ci){
  projects[si].cards[ci].collapsed=!projects[si].cards[ci].collapsed;
  renderProjects();schedule();
}

function toggleColorPicker(e,si,ci,cur){
  e.stopPropagation();
  const popup=document.getElementById('cp-'+si+'-'+ci);
  document.querySelectorAll('.color-picker-popup').forEach(p=>{if(p!==popup)p.classList.add('hidden');});
  popup.classList.toggle('hidden');
}

function pickColor(e,si,ci,col){
  e.stopPropagation();
  projects[si].color=col;
  document.querySelectorAll('.color-picker-popup').forEach(p=>p.classList.add('hidden'));
  renderProjects();schedule();
}

document.addEventListener('click',()=>{
  document.querySelectorAll('.color-picker-popup').forEach(p=>p.classList.add('hidden'));
});

loadFromDB();
</script>
</body>
</html>
